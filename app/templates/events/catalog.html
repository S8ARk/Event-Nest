{% extends "base.html" %}

{% block title %}Event Catalog{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h2>Discover Events</h2>
    {% if current_user.is_authenticated and current_user.role in ['organizer', 'admin'] %}
    <a href="{{ url_for('events.create') }}" class="btn">+ Create New Event</a>
    {% endif %}
</div>

<!-- Search & Filter Bar -->
<div class="card" style="margin-bottom: 2rem; padding: 1rem 2rem;">
    <div style="display: flex; gap: 1rem; align-items: flex-end;">
        <div style="flex: 2;">
            <label style="font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 0.25rem;">Search</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Search events by keyword...">
        </div>
        <div style="flex: 1;">
            <label style="font-weight: 600; font-size: 0.85rem; display: block; margin-bottom: 0.25rem;">Category
                Filter</label>
            <select id="categorySelect" class="form-control">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <button type="button" id="clearBtn" class="btn"
                style="background-color: var(--text-light); padding: 0.6rem 1rem;">Clear</button>
        </div>
    </div>
</div>

<!-- Event Grid -->
<div id="events-container"
    style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
    <!-- Populated by JS -->
</div>
{% endblock %}

{% block extra_js %}
<script>
    const eventsData = [
        {% for event in events %}
    {
        id: {{ event.id }},
        title: {{ event.title | tojson }},
        description: {{ event.description | tojson }},
        category: {{ event.category.name | tojson }},
        categoryId: "{{ event.category_id }}",
            date: {{ event.date.strftime('%b %d, %Y') | tojson }},
        time: {{ event.time.strftime('%I:%M %p') | tojson }},
        location: {{ event.location | tojson }},
        organizer: {{ event.organizer.name | tojson }},
        detailUrl: "{{ url_for('events.detail', event_id=event.id) }}"
    } {% if not loop.last %}, {% endif %}
    {% endfor %}
    ];

    const container = document.getElementById('events-container');
    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');
    const clearBtn = document.getElementById('clearBtn');

    function renderEvents(eventsToRender) {
        if (eventsToRender.length === 0) {
            container.innerHTML = `
                <div style="grid-column: 1 / -1; text-align: center; padding: 4rem; color: var(--text-light); background: white; border-radius: var(--border-radius);">
                    <h3 style="margin-bottom: 1rem;">No events found</h3>
                    <p>Try adjusting your search filters or check back later!</p>
                </div>`;
            return;
        }

        const htmlStrings = eventsToRender.map(event => `
            <div class="card event-card" 
                 onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 10px 15px rgba(0,0,0,0.1)';" 
                 onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='var(--box-shadow)';"
                 style="padding: 0; display: flex; flex-direction: column; overflow: hidden; transition: all 0.3s ease; cursor: pointer;"
                 onclick="window.location.href='${event.detailUrl}'">
                <div style="background-color: var(--primary-color); color: white; padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600; display: flex; justify-content: space-between;">
                    <span>${event.category}</span>
                    <span>${event.date}</span>
                </div>
                <div style="padding: 1.5rem; flex: 1; display: flex; flex-direction: column;">
                    <h3 style="margin-bottom: 0.5rem; color: var(--secondary-color);">${event.title}</h3>
                    <div style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 1rem;">
                        <p>📍 ${event.location}</p>
                        <p>⏰ ${event.time}</p>
                        <p>👥 Organized by: ${event.organizer}</p>
                    </div>
                    <p style="margin-bottom: 1.5rem; font-size: 0.95rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                        ${event.description}
                    </p>
                    <div style="margin-top: auto;">
                        <span class="btn" style="width: 100%; text-align: center; display: block;">View Details</span>
                    </div>
                </div>
            </div>
        `);
        container.innerHTML = htmlStrings.join('');
    }

    function filterEvents() {
        const query = searchInput.value.toLowerCase();
        const cat = categorySelect.value;

        const filtered = eventsData.filter(event => {
            const matchesSearch = event.title.toLowerCase().includes(query) || event.description.toLowerCase().includes(query);
            const matchesCat = cat === "" || event.categoryId === cat;
            return matchesSearch && matchesCat;
        });

        renderEvents(filtered);
    }

    searchInput.addEventListener('input', filterEvents);
    categorySelect.addEventListener('change', filterEvents);
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        categorySelect.value = '';
        filterEvents();
    });

    // Initial render
    renderEvents(eventsData);
</script>
{% endblock %}
